name: "Linting"
description: "Run Ruff and SPDX header checks for the Evo MCP project"

runs:
  using: "composite"
  steps:
    - uses: ./.github/actions/install-uv

    - name: Run Ruff check
      shell: bash
      run: uv run --extra dev ruff check

    - name: Run Ruff format check
      shell: bash
      run: uv run --extra dev ruff format --check

    - name: Check Python license headers
      shell: bash
      run: |
        mapfile -t python_files < <(find src scripts -type f -name '*.py')
        if ! uv run --extra dev reuse lint-file "${python_files[@]}"; then
          echo "::error::License headers need updating. Run 'make lint-fix' to apply reuse annotations."
          exit 1
        fi
